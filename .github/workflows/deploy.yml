name: Deploy Digital Garden to Coreserver

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build Static HTML
        run: npm run build

      - name: Deploy to Coreserver
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -u ${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }} ${{ secrets.FTP_HOST }} <<EOF
          set ftp:ssl-allow no
          set mirror:use-cache no
          cd /public_html/2t8.net/yusquid/
          mirror -R --delete ./out/ .
          quit
          EOF
